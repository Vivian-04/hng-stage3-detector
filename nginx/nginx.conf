user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Smart source IP: use X-Forwarded-For if set, else direct IP
    map $http_x_forwarded_for $real_source_ip {
        ""      $remote_addr;
        default $http_x_forwarded_for;
    }

    # JSON log format - required fields per task spec
    log_format json_combined escape=json
        '{'
            '"source_ip":"$real_source_ip",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer"'
        '}';

    access_log /var/log/nginx/hng-access.log json_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 512M;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    upstream nextcloud {
        server nextcloud:80;
    }

    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://nextcloud;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
